# Compose PROD — utilisé sur le serveur Windows MHP.
# Différences vs docker-compose.yml (dev) :
#   - Pas de service postgres : on se connecte au PostgreSQL 18 déjà installé sur l'hôte
#   - Port frontend 8081 (le 8080 est pris par MHP_app, 3000 par d'autres outils)
#   - Pas d'exposition externe du backend
#
# Lancer :  docker compose -f docker-compose.prod.yml up -d --build

services:

  backend:
    build: ./backend
    container_name: mhp_datasheet_backend
    env_file: .env
    environment:
      DB_HOST: ${DB_HOST}
      DB_PORT: ${DB_PORT:-5432}
      DB_NAME: ${DB_NAME}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    expose:
      - "8000"
    extra_hosts:
      # Permet à `DB_HOST=host.docker.internal` de joindre le PG du serveur Windows
      - "host.docker.internal:host-gateway"
    restart: unless-stopped

  frontend:
    image: nginx:alpine
    container_name: mhp_datasheet_frontend
    ports:
      - "8081:80"
    volumes:
      - ./frontend:/usr/share/nginx/html:ro
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend
    restart: unless-stopped
