# ============================================================
#  MHP DataSheet — server block Nginx (port 8081)
#
#  À placer dans :
#    C:\nginx\conf\sites\mhp-datasheet.conf  (si conf/sites/*.conf est inclus)
#  OU à coller dans nginx.conf à l'intérieur du bloc http { ... }
#
#  Recharger Nginx après modification :
#    C:\nginx\nginx.exe -s reload
# ============================================================

server {
    listen 8081;
    server_name _;

    # Sécurité de base
    server_tokens off;
    client_max_body_size 8m;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "no-referrer" always;

    # Racine = dossier frontend du repo
    root C:/MHP/mhp-datasheet/frontend;
    index index.html;

    # Pas de cache navigateur (utile pendant les itérations dev/maintenance)
    location ~* \.(?:css|js|woff2?)$ {
        add_header Cache-Control "no-store, no-cache, must-revalidate" always;
        expires off;
        try_files $uri =404;
    }

    location / {
        add_header Cache-Control "no-store, no-cache, must-revalidate" always;
        try_files $uri $uri/ /index.html;
    }

    # Proxy /api/* → backend FastAPI sur 127.0.0.1:8001
    location /api/ {
        proxy_pass http://127.0.0.1:8001/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_connect_timeout 5s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    # ─── Restriction LAN (recommandé en prod, décommenter et adapter le subnet) ───
    # location / {
    #     allow 192.168.1.0/24;
    #     deny  all;
    #     try_files $uri $uri/ /index.html;
    # }
}
